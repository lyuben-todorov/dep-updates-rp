# Grafana config for the /rp/ instance. Mirrors the main grafana layout
# but binds to 3001 and writes to /var/lib/grafana-rp/.
#
# Minimal overrides — anything not set here defaults to the upstream
# /etc/grafana/grafana.ini values (via systemd unit's --config).

[paths]
data = /var/lib/grafana-rp
logs = /var/log/grafana-rp
plugins = /var/lib/grafana-rp/plugins
provisioning = /etc/grafana-rp/provisioning

[server]
http_addr = 127.0.0.1
http_port = 3001
domain = bigcrack.net
root_url = https://bigcrack.net/rp/
serve_from_sub_path = true

[database]
type = sqlite3
path = grafana.db

[security]
# Default admin/admin on first boot — change immediately after setup.
disable_gravatar = true

[users]
allow_sign_up = false

[analytics]
reporting_enabled = false
check_for_updates = false
